<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur Markdown en Direct</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }
        textarea, #preview {
            width: 100%;
            min-height: 300px;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            background-color: #444;
            color: #fff;
            resize: vertical;
        }
        button {
            padding: 10px 20px;
            background-color: #555;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #666;
        }
        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
            textarea, #preview {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <textarea id="editor" placeholder="Écrivez votre Markdown ici..."></textarea>
        <div id="preview"></div>
    </div>
    <button onclick="copyHTML()">Copier le HTML</button>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        editor.addEventListener('input', updatePreview);

        function updatePreview() {
            const markdownText = editor.value;
            const htmlContent = marked.parse(markdownText);
            preview.innerHTML = sanitizeHTML(htmlContent);
        }

        function copyHTML() {
            const htmlContent = '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Markdown Preview</title></head><body>' + preview.innerHTML + '</body></html>';
            navigator.clipboard.writeText(htmlContent).then(() => {
                alert('HTML copié dans le presse-papiers !');
            }).catch(err => {
                console.error('Échec de la copie : ', err);
            });
        }

        function sanitizeHTML(str) {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }
    </script>
</body>
</html>
