<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Minifier</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #1e1e1e;
            color: #ffffff;
            border: none;
            padding: 10px;
            font-size: 14px;
        }
        button {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #28a745;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .output {
            margin-top: 20px;
            background-color: #2c2c2c;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
        }
        .tree {
            margin-left: 20px;
        }
        .tree .object, .tree .array {
            cursor: pointer;
        }
        .tree .object::before, .tree .array::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .tree .object::before {
            background-color: #6c757d;
        }
        .tree .array::before {
            background-color: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON Formatter & Minifier</h1>
        <textarea id="jsonInput" placeholder='{"key": "value", "array": [1, 2, 3]}'></textarea>
        <button onclick="formatJson()">Formater</button>
        <button onclick="minifyJson()">Minifier</button>
        <div class="output" id="output"></div>
    </div>

    <script>
        function formatJson() {
            const input = document.getElementById('jsonInput').value;
            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 2);
                displayOutput(formatted, 'formatted');
            } catch (error) {
                displayError(error.message, error.lineNumber, error.columnNumber);
            }
        }

        function minifyJson() {
            const input = document.getElementById('jsonInput').value;
            try {
                const parsed = JSON.parse(input);
                const minified = JSON.stringify(parsed);
                displayOutput(minified, 'minified');
            } catch (error) {
                displayError(error.message, error.lineNumber, error.columnNumber);
            }
        }

        function displayOutput(output, type) {
            document.getElementById('output').innerHTML = `
                <h2>${type === 'formatted' ? 'Formatted JSON' : 'Minified JSON'}</h2>
                <pre class="tree">${output}</pre>
            `;
        }

        function displayError(message, line, column) {
            document.getElementById('output').innerHTML = `
                <h2>Error</h2>
                <p>${message} at line ${line}, column ${column}</p>
            `;
        }
    </script>
</body>
</html>
