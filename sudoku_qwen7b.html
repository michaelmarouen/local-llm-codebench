<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-gap: 2px;
        }
        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .cell input {
            width: 36px;
            height: 36px;
            text-align: center;
            border: none;
            background-color: transparent;
            outline: none;
        }
        .error {
            border-color: red;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sudoku</h1>
        <div class="grid" id="sudokuGrid"></div>
        <div class="controls">
            <button onclick="newGame('easy')">Nouvelle partie (Facile)</button>
            <button onclick="newGame('medium')">Nouvelle partie (Moyen)</button>
            <button onclick="newGame('hard')">Nouvelle partie (Difficile)</button>
            <button onclick="solveSudoku()">Résoudre</button>
        </div>
        <p id="timer">00:00</p>
    </div>

    <script>
        const grid = document.getElementById('sudokuGrid');
        let board = [];
        let solution = [];
        let timer;
        let time = 0;

        function newGame(difficulty) {
            clearInterval(timer);
            time = 0;
            updateTimer();
            generateBoard(difficulty);
            renderBoard();
        }

        function generateBoard(difficulty) {
            const emptyBoard = Array(9).fill().map(() => Array(9).fill(0));
            board = solve(emptyBoard, difficulty);
            solution = JSON.parse(JSON.stringify(board));
        }

        function solve(board, difficulty) {
            let emptyCell = findEmptyCell(board);
            if (!emptyCell) return board;
            const [row, col] = emptyCell;

            for (let num = 1; num <= 9; num++) {
                if (isValid(board, row, col, num)) {
                    board[row][col] = num;
                    if (difficulty === 'easy' && Math.random() < 0.7) continue;
                    if (difficulty === 'medium' && Math.random() < 0.5) continue;
                    if (difficulty === 'hard') continue;

                    const solvedBoard = solve(board, difficulty);
                    if (solvedBoard) return solvedBoard;
                }
            }

            board[row][col] = 0;
            return null;
        }

        function findEmptyCell(board) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] === 0) return [row, col];
                }
            }
            return null;
        }

        function isValid(board, row, col, num) {
            for (let i = 0; i < 9; i++) {
                if (board[row][i] === num || board[i][col] === num) return false;
            }

            const startRow = Math.floor(row / 3) * 3;
            const startCol = Math.floor(col / 3) * 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[startRow + i][startCol + j] === num) return false;
                }
            }

            return true;
        }

        function renderBoard() {
            grid.innerHTML = '';
            board.forEach((row, rowIndex) => {
                row.forEach((cell, colIndex) => {
                    const cellElement = document.createElement('div');
                    cellElement.classList.add('cell');
                    if (solution[rowIndex][colIndex] !== 0) {
                        cellElement.textContent = solution[rowIndex][colIndex];
                        cellElement.style.color = '#aaa';
                    }
                    grid.appendChild(cellElement);
                });
            });

            const cells = document.querySelectorAll('.cell input');
            cells.forEach((cell, index) => {
                const [row, col] = getCellPosition(index);
                cell.value = board[row][col] || '';
                cell.addEventListener('input', () => validateInput(row, col));
                cell.addEventListener('keydown', (e) => handleKeydown(e, row, col));
            });
        }

        function getCellPosition(index) {
            const row = Math.floor(index / 9);
            const col = index % 9;
            return [row, col];
        }

        function validateInput(row, col) {
            const value = parseInt(board[row][col]);
            if (isNaN(value) || value < 1 || value > 9) {
                board[row][col] = '';
                document.querySelector(`.cell:nth-child(${(row * 9) + col + 1})`).classList.add('error');
            } else {
                document.querySelector(`.cell:nth-child(${(row * 9) + col + 1})`).classList.remove('error');
            }
        }

        function handleKeydown(e, row, col) {
            if (e.key >= '1' && e.key <= '9') {
                board[row][col] = parseInt(e.key);
                validateInput(row, col);
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                board[row][col] = '';
                document.querySelector(`.cell:nth-child(${(row * 9) + col + 1})`).classList.remove('error');
            }
        }

        function solveSudoku() {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] === 0) {
                        const emptyCell = [row, col];
                        backtracking(emptyCell);
                        break;
                    }
                }
            }
        }

        function backtracking(cell) {
            const [row, col] = cell;
            for (let num = 1; num <= 9; num++) {
                if (isValid(board, row, col, num)) {
                    board[row][col] = num;
                    renderBoard();
                    if (findEmptyCell(board)) {
                        backtracking(findEmptyCell(board));
                    } else {
                        return true;
                    }
                }
            }

            board[row][col] = 0;
            renderBoard();
            return false;
        }

        function updateTimer() {
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            document.getElementById('timer').textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            time++;
        }

        setInterval(updateTimer, 1000);

        newGame('easy');
    </script>
</body>
</html>
