<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .card {
            width: 100%;
            height: 100%;
            background-color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card.matched {
            background-color: #4caf50;
        }
        .controls {
            margin-top: 20px;
        }
        .score {
            font-size: 24px;
        }
        .timer {
            font-size: 24px;
        }
        @media (max-width: 600px) {
            .board {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Memory Game</h1>
        <button id="modeBtn">1 Player Mode</button>
        <div class="controls" id="controls">
            <span class="score" id="player1Score">Player 1: 0</span>
            <span class="score" id="player2Score">Player 2: 0</span>
            <span class="timer" id="timer">Time: 00:00</span>
        </div>
        <div class="board" id="board"></div>
    </div>

    <script>
        const board = document.getElementById('board');
        const modeBtn = document.getElementById('modeBtn');
        const player1ScoreDisplay = document.getElementById('player1Score');
        const player2ScoreDisplay = document.getElementById('player2Score');
        const timerDisplay = document.getElementById('timer');

        let cards = [];
        let selectedCards = [];
        let score1 = 0;
        let score2 = 0;
        let currentPlayer = 1;
        let timeLeft = 60; // 1 minute
        let interval;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createBoard() {
            cards = [];
            for (let i = 1; i <= 8; i++) {
                cards.push({ id: i, flipped: false, matched: false });
                cards.push({ id: i, flipped: false, matched: false });
            }
            shuffle(cards);
            board.innerHTML = '';
            cards.forEach(card => {
                const div = document.createElement('div');
                div.classList.add('card');
                div.dataset.id = card.id;
                div.addEventListener('click', flipCard);
                board.appendChild(div);
            });
        }

        function flipCard(event) {
            if (selectedCards.length < 2 && !event.target.classList.contains('flipped') && !event.target.classList.contains('matched')) {
                event.target.classList.add('flipped');
                selectedCards.push(event.target);
                if (selectedCards.length === 2) {
                    checkForMatch();
                }
            }
        }

        function checkForMatch() {
            const [card1, card2] = selectedCards;
            if (card1.dataset.id === card2.dataset.id) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                if (currentPlayer === 1) {
                    score1++;
                    player1ScoreDisplay.textContent = `Player 1: ${score1}`;
                } else {
                    score2++;
                    player2ScoreDisplay.textContent = `Player 2: ${score2}`;
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                }, 300);
            }
            selectedCards = [];
            if (document.querySelectorAll('.matched').length === cards.length) {
                showVictoryScreen();
            } else if (currentPlayer === 1 && score1 < score2 || currentPlayer === 2 && score2 < score1) {
                switchPlayer();
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            board.style.pointerEvents = 'none';
            setTimeout(() => {
                board.style.pointerEvents = 'auto';
            }, 500);
        }

        function showVictoryScreen() {
            clearInterval(interval);
            const victoryScreen = document.createElement('div');
            victoryScreen.classList.add('victory-screen');
            victoryScreen.innerHTML = `
                <h2>Victory!</h2>
                <button id="restartBtn">Replay</button>
            `;
            board.appendChild(victoryScreen);

            document.getElementById('restartBtn').addEventListener('click', () => {
                resetGame();
            });
        }

        function resetGame() {
            clearInterval(interval);
            score1 = 0;
            score2 = 0;
            currentPlayer = 1;
            player1ScoreDisplay.textContent = `Player 1: ${score1}`;
            player2ScoreDisplay.textContent = `Player 2: ${score2}`;
            timeLeft = 60;
            timerDisplay.textContent = 'Time: 00:00';
            board.innerHTML = '';
            createBoard();
        }

        function startTimer() {
            interval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerDisplay.textContent = `Time: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                } else {
                    clearInterval(interval);
                    showVictoryScreen();
                }
            }, 1000);
        }

        modeBtn.addEventListener('click', () => {
            if (modeBtn.textContent === '1 Player Mode') {
                modeBtn.textContent = '2 Players Mode';
                score2 = 0;
                player2ScoreDisplay.style.display = 'none';
            } else {
                modeBtn.textContent = '1 Player Mode';
                score2 = 0;
                player2ScoreDisplay.style.display = 'inline-block';
            }
        });

        createBoard();
        startTimer();
    </script>
</body>
</html>
