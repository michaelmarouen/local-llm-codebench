<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur Pathfinding A*</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: white;
        }
        .container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            gap: 2px;
            margin-bottom: 20px;
        }
        .cell {
            width: 30px;
            height: 30px;
            background-color: #333;
            border: 1px solid #555;
            cursor: pointer;
        }
        .start {
            background-color: green;
        }
        .end {
            background-color: red;
        }
        .visited {
            background-color: blue;
        }
        .path {
            background-color: yellow;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visualiseur Pathfinding A*</h1>
        <div id="grid" class="grid-container"></div>
        <button onclick="startAStar()">Lancer</button>
        <button onclick="resetGrid()">Reset</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const gridSize = 10;
        let startCell = null;
        let endCell = null;

        function createGrid() {
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = Math.floor(i / gridSize);
                cell.dataset.col = i % gridSize;
                cell.addEventListener('click', toggleWall);
                grid.appendChild(cell);
            }
        }

        function toggleWall(event) {
            const cell = event.target;
            if (cell === startCell || cell === endCell) return;

            if (cell.classList.contains('wall')) {
                cell.classList.remove('wall');
            } else {
                cell.classList.add('wall');
            }
        }

        function setStartEnd(cell, isStart) {
            if (isStart && startCell) {
                startCell.classList.remove('start');
            } else if (!isStart && endCell) {
                endCell.classList.remove('end');
            }

            cell.classList.toggle(isStart ? 'start' : 'end');
            if (isStart) {
                startCell = cell;
            } else {
                endCell = cell;
            }
        }

        function resetGrid() {
            const cells = grid.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('wall', 'visited', 'path', 'start', 'end');
            });
            startCell = null;
            endCell = null;
        }

        function getNeighbors(node) {
            const neighbors = [];
            const row = parseInt(node.dataset.row);
            const col = parseInt(node.dataset.col);

            const directions = [
                [0, 1], // right
                [1, 0], // down
                [0, -1], // left
                [-1, 0] // up
            ];

            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;

                if (newRow >= 0 && newRow < gridSize && newCol >= 0 && newCol < gridSize) {
                    const neighbor = grid.querySelector(`.cell[data-row="${newRow}"][data-col="${newCol}"]`);
                    if (!neighbor.classList.contains('wall')) {
                        neighbors.push(neighbor);
                    }
                }
            }

            return neighbors;
        }

        function heuristic(a, b) {
            const rowA = parseInt(a.dataset.row);
            const colA = parseInt(a.dataset.col);
            const rowB = parseInt(b.dataset.row);
            const colB = parseInt(b.dataset.col);

            return Math.abs(rowA - rowB) + Math.abs(colA - colB);
        }

        async function startAStar() {
            if (!startCell || !endCell) {
                alert('Veuillez définir une case de départ et une case d\'arrivée.');
                return;
            }

            const openSet = [startCell];
            const cameFrom = {};
            const gScore = {};
            const fScore = {};

            grid.querySelectorAll('.cell').forEach(cell => {
                gScore[cell] = Infinity;
                fScore[cell] = Infinity;
            });

            gScore[startCell] = 0;
            fScore[startCell] = heuristic(startCell, endCell);

            while (openSet.length > 0) {
                let current = openSet[0];
                for (let i = 1; i < openSet.length; i++) {
                    if (fScore[openSet[i]] < fScore[current]) {
                        current = openSet[i];
                    }
                }

                if (current === endCell) {
                    reconstructPath(cameFrom, current);
                    return;
                }

                openSet.splice(openSet.indexOf(current), 1);
                current.classList.add('visited');

                const neighbors = getNeighbors(current);
                for (const neighbor of neighbors) {
                    const tentativeGScore = gScore[current] + 1;

                    if (tentativeGScore < gScore[neighbor]) {
                        cameFrom[neighbor] = current;
                        gScore[neighbor] = tentativeGScore;
                        fScore[neighbor] = tentativeGScore + heuristic(neighbor, endCell);

                        if (!openSet.includes(neighbor)) {
                            openSet.push(neighbor);
                        }
                    }
                }

                await new Promise(resolve => setTimeout(resolve, 50));
            }

            alert('Aucun chemin trouvé.');
        }

        function reconstructPath(cameFrom, current) {
            const totalPath = [current];
            while (cameFrom[current]) {
                current = cameFrom[current];
                totalPath.unshift(current);
                current.classList.add('path');
                await new Promise(resolve => setTimeout(resolve, 50));
            }
        }

        createGrid();
    </script>
</body>
</html>
