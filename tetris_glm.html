<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Modern</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #00e5ff;
            --text-color: #ffffff;
            --grid-line: #333;
            --accent: #ff0055;
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation; /* Empêche le zoom sur double tap */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Conteneur Principal */
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            width: 100%;
            max-width: 600px;
        }

        /* Zone du Jeu (Canvas) */
        .canvas-wrapper {
            position: relative;
            border: 2px solid #333;
            border-radius: 4px;
            background-color: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            background-color: #000;
        }

        /* Panneau d'Information (Score, Next, Level) */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 120px;
        }

        .stat-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        canvas#next-piece {
            background: transparent;
            margin: 0 auto;
        }

        /* Écran de Début / Game Over */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .overlay.hidden {
            display: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        .btn {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-color);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Contrôles Mobiles */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
        }

        .control-btn {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 20px 0;
            border-radius: 8px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .control-btn:active {
            background: var(--primary-color);
            color: black;
        }

        .control-btn.rotate {
            grid-column: 2;
            background: #2a3d4a;
        }

        .control-btn.left {
            grid-column: 1;
        }

        .control-btn.right {
            grid-column: 3;
        }

        .control-btn.down {
            grid-column: 2;
            background: #2a3d4a;
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .game-container {
                flex-direction: column;
                padding: 10px;
            }
            .info-panel {
                flex-direction: row;
                justify-content: space-between;
                min-width: unset;
            }
            .stat-box {
                padding: 5px 10px;
                flex: 1;
            }
            .stat-value {
                font-size: 1rem;
            }
            .controls {
                display: grid; /* Afficher les boutons sur mobile */
            }
            .desktop-hint {
                display: none;
            }
        }
        
        @media (min-width: 601px) {
            .controls {
                display: none; /* Cacher les boutons tactiles sur desktop */
            }
            .desktop-hint {
                display: block;
                margin-top: 15px;
                color: #666;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Zone de Jeu -->
        <div class="canvas-wrapper">
            <canvas id="tetris" width="240" height="400"></canvas>
            
            <!-- Écran de démarrage / Game Over -->
            <div id="overlay" class="overlay">
                <h1 id="overlay-title">TETRIS</h1>
                <p class="subtitle" id="overlay-msg">Prêt à jouer ?</p>
                <button class="btn" id="start-btn">JOUER</button>
            </div>
        </div>

        <!-- Panneau d'info -->
        <div class="info-panel">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Niveau</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Prochaine</div>
                <canvas id="next-piece" width="80" height="80"></canvas>
            </div>
        </div>
    </div>

    <!-- Contrôles Tactiles -->
    <div class="controls">
        <div class="control-btn left" data-key="ArrowLeft">←</div>
        <div class="control-btn rotate" data-key="ArrowUp">↻</div>
        <div class="control-btn right" data-key="ArrowRight">→</div>
        <div class="control-btn down" data-key="ArrowDown">↓</div>
    </div>

    <p class="desktop-hint">Utilisez les flèches du clavier pour jouer.</p>

    <script>
        // --- Configuration du Jeu ---
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 20; // Taille d'un bloc en pixels (peut être ajustée via CSS si besoin, mais ici on utilise le canvas raw)
        
        // Couleurs des pièces (Tetrominoes)
        const COLORS = [
            null,
            '#FF0D72', // T
            '#0DC2FF', // O
            '#0DFF72', // L
            '#F538FF', // J
            '#FF8E0D', // I
            '#FFE138', // S
            '#3877FF', // Z
        ];

        // Définition des pièces (formes matricielles)
        const PIECES = [
            [], // vide pour l'index 0
            [[0, 1, 0], [1, 1, 1], [0, 0, 0]], // T
            [[2, 2], [2, 2]],                   // O
            [[0, 3, 0], [0, 3, 0], [0, 3, 3]], // L
            [[0, 4, 0], [0, 4, 0], [4, 4, 0]], // J
            [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]], // I
            [[0, 6, 6], [6, 6, 0], [0, 0, 0]], // S
            [[7, 7, 0], [0, 7, 7], [0, 0, 0]], // Z
        ];

        // --- Variables Globales ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextContext = nextCanvas.getContext('2d');

        // Échelle pour dessiner les blocs plus grands sur le canvas
        context.scale(20, 20); 
        nextContext.scale(20, 20);

        let arena = createMatrix(COLS, ROWS);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
            lines: 0,
            next: null
        };

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;
        let isPaused = false;
        let animationId = null;

        // --- Initialisation ---
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            // On copie la matrice pour ne pas modifier la définition originale
            return PIECES[type].map(row => [...row]);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Effet de style moderne
                        ctx.fillStyle = COLORS[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Légère ombre interne pour le relief
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Effet de brillance au centre
                        ctx.fillStyle = 'rgba(255,255,255,0.1)';
                        ctx.fillRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.8, 0.8);
                    }
                });
            });
        }

        function draw() {
            // Fond sombre
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        function drawNext() {
            nextContext.fillStyle = '#1e1e1e'; // Fond transparent
            nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (player.next) {
                // Centrer la pièce dans le canvas de 4x4
                const offsetX = (4 - player.next[0].length) / 2;
                const offsetY = (4 - player.next.length) / 2;
                drawMatrix(player.next, {x: offsetX, y: offsetY}, nextContext);
            }
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            // Transposée
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            // Inversion des lignes
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            // Wall kick (gérer les bords)
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); // Annuler rotation si ça ne rentre pas
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                // Supprimer la ligne
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
            
            // Augmenter le niveau tous les 10 lignes
            const newLevel = Math.floor(player.lines / 10) + 1;
            if (newLevel > player.level) {
                player.level = newLevel;
                // Accélérer la gravité (min 100ms)
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100); 
            }
            
            updateScore();
        }

        function playerReset() {
            if (player.next === null) {
                player.next = createPiece((Math.random() * 7 | 0) + 1);
            }
            player.matrix = player.next;
            player.next = createPiece((Math.random() * 7 | 0) + 1);
            drawNext();

            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            if (collide(arena, player)) {
                gameOver();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            document.getElementById('overlay-title').innerText = "GAME OVER";
            document.getElementById('overlay-msg').innerText = `Score Final: ${player.score}`;
            document.getElementById('start-btn').innerText = "REJOUER";
            document.getElementById('overlay').classList.remove('hidden');
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            player.lines = 0;
            dropInterval = 1000;
            isGameOver = false;
            updateScore();
            player.next = null; // Reset next piece
            playerReset();
            document.getElementById('overlay').classList.add('hidden');
            update();
        }

        // --- Boucle de Jeu ---
        function update(time = 0) {
            if (isGameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        // --- Contrôles ---
        document.addEventListener('keydown', event => {
            if (isGameOver) return;
            
            // Empêcher le défilement de la page avec les flèches
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(event.code) > -1) {
                event.preventDefault();
            }

            if (event.keyCode === 37) { // Gauche
                playerMove(-1);
            } else if (event.keyCode === 39) { // Droite
                playerMove(1);
            } else if (event.keyCode === 40) { // Bas
                playerDrop();
            } else if (event.keyCode === 38) { // Haut (Rotation)
                playerRotate(1);
            }
        });

        // Contrôles Tactiles
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Empêcher le comportement par défaut tactile
                if (isGameOver) return;

                const key = btn.getAttribute('data-key');
                
                if (key === 'ArrowLeft') playerMove(-1);
                if (key === 'ArrowRight') playerMove(1);
                if (key === 'ArrowDown') playerDrop();
                if (key === 'ArrowUp') playerRotate(1);
            });
        });

        // Bouton Start
        document.getElementById('start-btn').addEventListener('click', () => {
            resetGame();
        });

        // Premier rendu pour afficher la grille vide
        draw();

    </script>
</body>
</html>
